spring.application.name=baccuisine_backend

# ===================================
# Server Configuration
# ===================================
server.port=8080

# ============================================================
# Database Configuration
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/bac_cuisine_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Pass@word1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================================
# JPA/Hibernate Configuration
# ==================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# JWT Configuration
# ==============================
# CRITICAL: Must be at least 32 characters for HS256 algorithm
# Generate a secure secret:
#   Linux/Mac: openssl rand -base64 32
#   Windows PowerShell: [Convert]::ToBase64String([Security.Cryptography.RandomNumberGenerator]::GetBytes(32))
app.jwt.secret=YourSuperSecretKeyForJWTGenerationMustBeAtLeast32Chars!@#2024
app.jwt.expiration=86400000

# =============================
# Initialization
# =============================
spring.sql.init.mode=never
spring.sql.init.continue-on-error=false

# ===============================
# SWAGGER / OPENAPI
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ==========================================
# Logging
# ==========================================
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.baccuisine=DEBUG
logging.level.io.jsonwebtoken=DEBUG
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=true